<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>CapCulture v4.0</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root {
  --green:#1D9E75; --green-dark:#0F6E56; --green-light:#E1F5EE;
  --bg:#f5f4f0; --bg-card:#ffffff; --bg-sec:#eeecea;
  --border:rgba(0,0,0,0.10); --border-med:rgba(0,0,0,0.18);
  --text:#1a1a18; --text-sec:#6b6b66; --text-hint:#9e9e98;
  --radius:14px; --radius-sm:8px;
  --shadow:0 1px 4px rgba(0,0,0,0.07);
  --red:#e24b4a;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#141412; --bg-card:#1e1e1b; --bg-sec:#262622;
    --border:rgba(255,255,255,0.09); --border-med:rgba(255,255,255,0.16);
    --text:#f0efe8; --text-sec:#9a9a92; --text-hint:#6a6a62;
    --shadow:0 1px 4px rgba(0,0,0,0.3);
  }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:-apple-system,'Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:1000;background:var(--bg-card);border-bottom:0.5px solid var(--border);padding:9px 12px;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);}
.logo{display:flex;align-items:center;gap:6px;white-space:nowrap;}
.logo i{font-size:19px;color:var(--green);}
.logo-text{font-size:15px;font-weight:600;}
.version{font-size:10px;font-weight:500;color:var(--text-hint);background:var(--bg-sec);padding:2px 6px;border-radius:20px;border:0.5px solid var(--border);}
.search-wrap{position:relative;flex:1;min-width:0;}
.search-wrap i{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text-sec);pointer-events:none;}
.search-wrap input{width:100%;padding:7px 7px 7px 28px;font-size:13px;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);background:var(--bg-sec);color:var(--text);outline:none;}
.search-wrap input:focus{border-color:var(--green);background:var(--bg-card);}

/* TABS */
.tabs{position:fixed;top:52px;left:0;right:0;z-index:999;background:var(--bg-card);border-bottom:0.5px solid var(--border);display:flex;}
.tab{flex:1;padding:9px 0;font-size:13px;font-weight:500;text-align:center;cursor:pointer;color:var(--text-sec);border:none;background:transparent;border-bottom:2px solid transparent;}
.tab.active{color:var(--green);border-bottom-color:var(--green);}

/* VIEWS */
.view{position:fixed;top:93px;left:0;right:0;bottom:0;overflow:hidden;display:none;}
.view.active{display:block;}

/* MAP VIEW */
#map-view{display:none;}
#map-view.active{display:flex;flex-direction:column;}
#map{flex:1;z-index:1;}

/* MAP TOOLBAR */
.map-toolbar{position:absolute;top:10px;right:10px;z-index:500;display:flex;flex-direction:column;gap:6px;}
.zoom-indicator{position:absolute;bottom:36px;right:10px;z-index:500;background:var(--bg-card);border:0.5px solid var(--border-med);border-radius:var(--radius-sm);padding:5px 9px;font-size:12px;font-weight:600;color:var(--text-sec);box-shadow:var(--shadow);pointer-events:none;min-width:52px;text-align:center;}
.map-btn{width:40px;height:40px;border-radius:var(--radius-sm);border:0.5px solid var(--border-med);background:var(--bg-card);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow);}
.map-btn:active{background:var(--bg-sec);}
.map-btn.active-tool{background:var(--green);border-color:var(--green);color:#fff;}
.map-btn.danger{color:var(--red);}

/* DRAWING BAR */
.draw-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);z-index:500;display:none;align-items:center;gap:8px;background:var(--bg-card);border:0.5px solid var(--border-med);border-radius:30px;padding:6px 8px 6px 14px;box-shadow:0 2px 12px rgba(0,0,0,0.18);white-space:nowrap;}
.draw-bar.visible{display:flex;}
.draw-bar-info{font-size:12px;color:var(--text-sec);}
.draw-bar-info b{color:var(--green);}
.draw-bar-finish{background:var(--green);color:#fff;border:none;border-radius:20px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.draw-bar-finish:disabled{background:var(--border-med);color:var(--text-hint);cursor:not-allowed;}
.draw-bar-cancel{background:transparent;color:var(--text-sec);border:none;border-radius:20px;padding:7px 10px;font-size:13px;cursor:pointer;}

/* PANEL BOTTOM - new parcelle form */
.bottom-panel{position:absolute;bottom:0;left:0;right:0;z-index:600;background:var(--bg-card);border-top:0.5px solid var(--border);border-radius:16px 16px 0 0;padding:14px;box-shadow:0 -4px 20px rgba(0,0,0,0.12);transform:translateY(100%);transition:transform 0.28s ease;}
.bottom-panel.open{transform:translateY(0);}
.panel-handle{width:36px;height:4px;background:var(--border-med);border-radius:2px;margin:0 auto 12px;}
.panel-title{font-size:14px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;}
.panel-surface{font-size:13px;color:var(--text-sec);background:var(--bg-sec);padding:6px 10px;border-radius:var(--radius-sm);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.panel-surface b{color:var(--green);font-size:15px;}
.panel-row{display:flex;gap:8px;margin-bottom:10px;}
.panel-row input{flex:1;font-size:13px;padding:9px 10px;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);background:var(--bg-sec);color:var(--text);outline:none;}
.panel-row input:focus{border-color:var(--green);background:var(--bg-card);}
.panel-actions{display:flex;gap:8px;}
.btn-cancel{flex:1;padding:10px;font-size:13px;background:transparent;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);cursor:pointer;color:var(--text-sec);}
.btn-save{flex:2;padding:10px;font-size:13px;font-weight:600;background:var(--green);border:none;border-radius:var(--radius-sm);cursor:pointer;color:#fff;}

/* LIST VIEW */
#list-view{overflow-y:auto;padding:10px;}
.toolbar-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.add-btn{display:flex;align-items:center;gap:4px;padding:8px 12px;font-size:13px;font-weight:500;background:var(--green);border:none;border-radius:var(--radius-sm);cursor:pointer;color:#fff;white-space:nowrap;}
.add-btn:active{background:var(--green-dark);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:12px;}
.card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px;position:relative;box-shadow:var(--shadow);}
.card.hidden{display:none;}
.card.highlight{border-color:var(--green);box-shadow:0 0 0 2px rgba(29,158,117,0.25);}
.del-btn{position:absolute;top:7px;right:7px;width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:var(--text-hint);display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:14px;padding:0;}
.del-btn:active{color:var(--red);}
.lbl{font-size:10px;font-weight:600;color:var(--text-hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
.card input[type=text]{font-size:13px;font-weight:600;background:transparent;border:none;border-bottom:0.5px solid var(--border-med);border-radius:0;padding:2px 0 3px;color:var(--text);outline:none;width:calc(100% - 24px);min-width:0;}
.card input[type=text]:focus{border-bottom-color:var(--green);}
.surf-badge{display:inline-flex;align-items:center;gap:4px;background:var(--green-light);color:var(--green-dark);font-size:11px;font-weight:600;padding:3px 7px;border-radius:20px;margin:5px 0 7px;}
.surf-badge i{font-size:12px;}
.surf-row{display:flex;align-items:center;gap:5px;margin-top:4px;margin-bottom:8px;}
.surf-row input[type=number]{width:62px;font-size:12px;padding:4px 6px;text-align:right;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);background:var(--bg-sec);color:var(--text);outline:none;}
.surf-row input[type=number]:focus{border-color:var(--green);background:var(--bg-card);}
.surf-row .unit{font-size:11px;color:var(--text-sec);}
.coupes-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.cb{width:28px;height:28px;border-radius:50%;border:0.5px solid var(--border-med);background:transparent;cursor:pointer;font-size:11px;font-weight:600;color:var(--text-sec);display:flex;align-items:center;justify-content:center;padding:0;}
.cb.active{background:var(--green);border-color:var(--green);color:#fff;}
.card-stats{display:flex;justify-content:space-between;padding-top:7px;border-top:0.5px solid var(--border);}
.rendements{margin-top:8px;border-top:0.5px solid var(--border);padding-top:8px;}
.rdmt-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.rdmt-row:last-child{margin-bottom:0;}
.rdmt-label{font-size:10px;font-weight:600;color:var(--text-hint);text-transform:uppercase;letter-spacing:.04em;min-width:46px;}
.rdmt-inputs{display:flex;gap:4px;align-items:center;flex:1;flex-wrap:wrap;}
.rdmt-inputs input{width:50px;font-size:12px;padding:3px 5px;text-align:right;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);background:var(--bg-sec);color:var(--text);outline:none;}
.rdmt-inputs input:focus{border-color:var(--green);background:var(--bg-card);}
.rdmt-inputs select{font-size:11px;padding:3px 4px;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);background:var(--bg-sec);color:var(--text);outline:none;cursor:pointer;max-width:80px;}
.rdmt-inputs select:focus{border-color:var(--green);}
.rdmt-type-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 6px;border-radius:10px;white-space:nowrap;}
.type-enrubanne{background:#dbeafe;color:#1e40af;}
.type-vert{background:#dcfce7;color:#166534;}
.type-foin{background:#fef9c3;color:#854d0e;}
.type-paille{background:#ffedd5;color:#9a3412;}
.type-meteil{background:#fef08a;color:#713f12;}
.type-avoine{background:#fde68a;color:#78350f;}
.type-ble{background:#fcd34d;color:#92400e;}
.type-triticale{background:#fbbf24;color:#78350f;}
.type-orge{background:#f59e0b;color:#451a03;}
.type-sorgho{background:#d1fae5;color:#065f46;}
.type-autre{background:#f3f4f6;color:#374151;}
.rdmt-total{font-size:10px;color:var(--green);font-weight:600;white-space:nowrap;}
.sum-rdmt{background:var(--green-light,#E1F5EE);border-radius:var(--radius-sm);padding:9px 11px;border:0.5px solid rgba(29,158,117,0.2);}
.sum-rdmt .v{font-size:17px;font-weight:700;color:var(--green);}
.sum-rdmt .l{font-size:10px;color:var(--green-dark,#0F6E56);margin-top:2px;}
.cs{text-align:center;flex:1;}
.cs .v{font-size:13px;font-weight:600;color:var(--text);}
.cs .l{font-size:9px;color:var(--text-hint);margin-top:1px;text-transform:uppercase;letter-spacing:.03em;}
.locate-btn{width:28px;height:28px;border:0.5px solid var(--border-med);background:transparent;border-radius:var(--radius-sm);cursor:pointer;color:var(--text-sec);font-size:14px;display:flex;align-items:center;justify-content:center;padding:0;}
.locate-btn:active{background:var(--green-light);color:var(--green);}

/* SUMMARY */
.summary{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);margin-bottom:10px;}
.sum-title{font-size:11px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sum-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;margin-bottom:10px;}
.sc{background:var(--bg-sec);border-radius:var(--radius-sm);padding:9px 11px;border:0.5px solid var(--border);}
.sc .v{font-size:17px;font-weight:700;color:var(--text);}
.sc .l{font-size:10px;color:var(--text-sec);margin-top:2px;}
.detail-title{font-size:10px;font-weight:700;color:var(--text-hint);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}
.cline{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.cline:last-child{border-bottom:none;}
.cline .cn{color:var(--text-sec);}
.cline .cv{font-weight:600;color:var(--text);}
.no-result{grid-column:1/-1;text-align:center;padding:30px;color:var(--text-sec);font-size:14px;}
.empty{grid-column:1/-1;text-align:center;padding:40px 20px;color:var(--text-sec);}
.empty i{font-size:36px;color:var(--text-hint);display:block;margin-bottom:8px;}
.empty p{font-size:13px;line-height:1.6;}

/* Leaflet popup custom */
.leaflet-popup-content-wrapper{border-radius:10px !important;font-family:-apple-system,'Helvetica Neue',sans-serif;font-size:13px;}
.popup-name{font-weight:700;font-size:14px;margin-bottom:4px;}
.popup-surf{color:#1D9E75;font-weight:600;}
.popup-coupes{color:#6b6b66;font-size:12px;margin-top:3px;}
.popup-culture{font-size:12px;margin-top:3px;font-weight:600;}

/* RECAP VIEW */
#recap-view{overflow-y:auto;padding:10px;}
.recap-section{background:var(--bg-card);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px;box-shadow:var(--shadow);}
.recap-section-title{font-size:12px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.recap-table{width:100%;border-collapse:collapse;font-size:12px;}
.recap-table th{text-align:left;font-size:10px;font-weight:700;color:var(--text-hint);text-transform:uppercase;letter-spacing:.05em;padding:4px 6px;border-bottom:0.5px solid var(--border);}
.recap-table td{padding:5px 6px;border-bottom:0.5px solid var(--border);vertical-align:top;}
.recap-table tr:last-child td{border-bottom:none;}
.recap-table .total-row td{font-weight:700;background:var(--bg-sec);font-size:13px;}
.cult-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;flex-shrink:0;}
.cult-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;white-space:nowrap;}
.derobee-label{font-size:10px;color:var(--text-hint);font-style:italic;}

/* MAP legend */
.map-legend{position:absolute;bottom:36px;left:10px;z-index:500;background:var(--bg-card);border:0.5px solid var(--border-med);border-radius:var(--radius-sm);padding:7px 10px;box-shadow:var(--shadow);font-size:11px;display:none;}
.map-legend.visible{display:block;}
.legend-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.legend-row:last-child{margin-bottom:0;}
.legend-swatch{width:14px;height:10px;border-radius:2px;flex-shrink:0;}

/* CULTURE sélect dans carte parcelle */
.culture-select-wrap{margin-top:6px;margin-bottom:4px;}
.culture-select-wrap select{width:100%;font-size:12px;padding:4px 6px;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);background:var(--bg-sec);color:var(--text);outline:none;}
.culture-select-wrap select:focus{border-color:var(--green);}
.derobee-wrap{margin-top:3px;}
.redraw-btn{width:100%;margin-top:6px;padding:6px;font-size:11px;font-weight:500;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);background:transparent;color:var(--text-sec);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.redraw-btn:active{background:var(--bg-sec);color:var(--green);}
.derobee-toggle{font-size:11px;color:var(--text-sec);cursor:pointer;display:flex;align-items:center;gap:4px;background:none;border:none;padding:0;}
.derobee-toggle:hover{color:var(--green);}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <i class="ti ti-plant-2"></i>
    <span class="logo-text">CapCulture</span>
    <span class="version">v4.0</span>
  </div>

</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" onclick="showTab('map')"><i class="ti ti-map"></i> Carte</button>
  <button class="tab" onclick="showTab('list')"><i class="ti ti-layout-grid"></i> Parcelles</button>
  <button class="tab" onclick="showTab('recap')"><i class="ti ti-chart-bar"></i> Bilan</button>
</div>

<!-- MAP VIEW -->
<div id="map-view" class="view active">
  <div id="map"></div>

  <div class="map-toolbar">
    <button class="map-btn" id="btn-draw" onclick="toggleDraw()" title="Dessiner une parcelle"><i class="ti ti-pencil"></i></button>
    <button class="map-btn" id="btn-locate" onclick="locateMe()" title="Ma position"><i class="ti ti-current-location"></i></button>
    <button class="map-btn" id="btn-layers" onclick="toggleLayer()" title="Changer de fond de carte"><i class="ti ti-layers"></i></button>
    <button class="map-btn" id="btn-cadastre" onclick="toggleCadastre()" title="Afficher le cadastre IGN"><i class="ti ti-map-2"></i></button>
    <button class="map-btn" id="btn-legend" onclick="toggleLegend()" title="Légende cultures"><i class="ti ti-palette"></i></button>
  </div>

  <div class="draw-bar" id="draw-bar">
    <span class="draw-bar-info" id="draw-info">Tapez pour placer les points</span>
    <button class="draw-bar-cancel" onclick="cancelDraw()" title="Annuler"><i class="ti ti-x"></i></button>
    <button class="draw-bar-finish" id="btn-finish" onclick="finishDraw()" disabled><i class="ti ti-check"></i> Terminer</button>
  </div>
  <div class="zoom-indicator" id="zoom-indicator">zoom 15</div>
  <div class="map-legend" id="map-legend"></div>

  <!-- BOTTOM PANEL new parcelle -->
  <div class="bottom-panel" id="bottom-panel">
    <div class="panel-handle"></div>
    <div class="panel-title">
      <span id="panel-title-text">Nouvelle parcelle</span>
      <button style="border:none;background:transparent;font-size:20px;color:var(--text-sec);cursor:pointer" onclick="cancelDraw()"><i class="ti ti-x"></i></button>
    </div>
    <div class="panel-surface">
      <i class="ti ti-ruler-measure" style="color:var(--green)"></i>
      Surface calculée : <b id="panel-surf">0.00 ha</b>
    </div>
    <div class="panel-row">
      <input type="text" id="panel-nom" placeholder="Nom de la parcelle…" autocomplete="off">
    </div>
    <div class="panel-actions">
      <button class="btn-cancel" onclick="cancelDraw()">Annuler</button>
      <button class="btn-save" onclick="saveParcelle()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- LIST VIEW -->
<div id="list-view" class="view">
  <div style="padding:8px 10px 0;position:sticky;top:93px;z-index:10;background:var(--bg);">
    <div class="search-wrap" style="margin-bottom:8px">
      <i class="ti ti-search"></i>
      <input type="text" id="search" placeholder="Rechercher une parcelle…" oninput="filterParcelles()" autocomplete="off">
    </div>
  </div>
  <div class="toolbar-row">
    <button class="add-btn" onclick="startDrawFromList()"><i class="ti ti-map-pin"></i> Dessiner sur carte</button>
    <button class="add-btn" style="background:var(--bg-sec);color:var(--text);border:0.5px solid var(--border-med)" onclick="addManual()"><i class="ti ti-plus"></i> Manuel</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- RECAP VIEW -->
<div id="recap-view" class="view">
  <div id="recap-content"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const MAX_C = 6;

// Familles de cultures avec couleur carte
const FAMILLES = [
  {val:'prairie',    label:'Prairies',    color:'#16a34a', fill:'#22c55e'},
  {val:'legumineuse',label:'Légumineuses',color:'#0891b2', fill:'#22d3ee'},
  {val:'cereale',    label:'Céréales',    color:'#ca8a04', fill:'#facc15'},
  {val:'autre_cult', label:'Autre',       color:'#9333ea', fill:'#c084fc'},
];
const CULTURES = [
  {val:'avoine',        label:'Avoine',               famille:'cereale'},
  {val:'ble',           label:'Blé',                  famille:'cereale'},
  {val:'luzerne',       label:'Luzerne',              famille:'legumineuse'},
  {val:'meteil',        label:'Méteil',               famille:'cereale'},
  {val:'orge',          label:'Orge',                 famille:'cereale'},
  {val:'prairie_multi', label:'Prairie multi-espèce', famille:'prairie'},
  {val:'ray_grass',     label:'Ray-grass',             famille:'prairie'},
  {val:'rg_trefle',     label:'RG / Trèfle',          famille:'prairie'},
  {val:'sainfoin',      label:'Sainfoin',              famille:'legumineuse'},
  {val:'sorgho',        label:'Sorgho',               famille:'prairie'},
  {val:'trefle',        label:'Trèfle',               famille:'legumineuse'},

function locateMe() {
  const btn = document.getElementById('btn-locate');

  }
  btn.classList.add('active-tool');

    function(pos) {

      const latlng = [pos.coords.latitude, pos.coords.longitude];
      map.setView(latlng, 17);
      if (myMarker) map.removeLayer(myMarker);
      myMarker = L.circleMarker(latlng, {

      else if (err.code === 3) msg = 'Délai dépassé. Réessayez.';

    t.id = 'toast';
    t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(0,0,0,0.78);color:#fff;font-size:13px;padding:9px 18px;border-radius:20px;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center;';
    document.body.appendChild(t);

  t.style.opacity = '1';
  clearTimeout(t._hide);
  t._hide = setTimeout(() => { t.style.opacity='0'; }, 3500);
}

// GEODESIC AREA (Shoelace on lat/lng then approximate m²)
function calcArea(pts) {
  if (pts.length < 3) return 0;
  const R = 6371000;
  let area = 0;
  const n = pts.length;
  for (let i = 0; i < n; i++) {
    const j = (i + 1) % n;
    const xi = pts[i].lng * Math.PI / 180;
    const yi = pts[i].lat * Math.PI / 180;
    const xj = pts[j].lng * Math.PI / 180;
    const yj = pts[j].lat * Math.PI / 180;
    area += (xj - xi) * (2 + Math.sin(yi) + Math.sin(yj));
  }
  area = Math.abs(area * R * R / 2);
  return area; // m²
}

function m2ToHa(m2) { return (m2 / 10000).toFixed(4); }

map.on('click', function(e) {
  if (!isDrawing) return;
  drawPoints.push(e.latlng);

  const m = L.circleMarker(e.latlng, {radius:5, color:'#fff', fillColor:'#1D9E75', fillOpacity:1, weight:2}).addTo(map);
  drawMarkers.push(m);

});

map.on('dblclick', function(e) {
  if (!isDrawing) return;
  if (drawPoints.length < 3) return;
  drawPoints.pop();

  finishDraw();
});

function updateDrawPreview() {
  if (drawPolyline) map.removeLayer(drawPolyline);
  if (drawPolygon) map.removeLayer(drawPolygon);
  if (drawPoints.length >= 2) {
    drawPolyline = L.polyline(drawPoints, {color:'#1D9E75', weight:2, dashArray:'6,4'}).addTo(map);
  }
  const btnFinish = document.getElementById('btn-finish');
  const info = document.getElementById('draw-info');
  if (drawPoints.length >= 3) {
    drawPolygon = L.polygon(drawPoints, {color:'#1D9E75', fillColor:'#1D9E75', fillOpacity:0.25, weight:2}).addTo(map);
    const area = calcArea(drawPoints);
    const ha = parseFloat(m2ToHa(area)).toFixed(2);
    if (info) info.innerHTML = `<b>${drawPoints.length} pts</b> · ${ha} ha`;
    if (btnFinish) btnFinish.disabled = false;
  } else {
    if (info) info.innerHTML = `<b>${drawPoints.length}</b> point${drawPoints.length > 1 ? 's' : ''} — min. 3`;
    if (btnFinish) btnFinish.disabled = true;
  }
}

function finishDraw() {
  isDrawing = false;
  document.getElementById('btn-draw').classList.remove('active-tool');
  document.getElementById('draw-bar').classList.remove('visible');
  map.getContainer().style.cursor = '';
  // clean preview
  if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }
  drawMarkers.forEach(m => map.removeLayer(m)); drawMarkers = [];
  // final polygon
  pendingArea = calcArea(drawPoints);
  pendingPolygon = L.polygon(drawPoints, {color:'#1D9E75', fillColor:'#1D9E75', fillOpacity:0.3, weight:2}).addTo(map);
  document.getElementById('panel-surf').textContent = parseFloat(m2ToHa(pendingArea)).toFixed(2) + ' ha';
  document.getElementById('panel-nom').value = '';
  document.getElementById('bottom-panel').classList.add('open');
  map.fitBounds(pendingPolygon.getBounds(), {padding:[60,60]});
}

function cancelDraw() {
  isDrawing = false;
  document.getElementById('btn-draw').classList.remove('active-tool');
  document.getElementById('draw-bar').classList.remove('visible');
  map.getContainer().style.cursor = '';
  if (drawPolyline) { map.removeLayer(drawPolyline); drawPolyline = null; }
  if (drawPolygon) { map.removeLayer(drawPolygon); drawPolygon = null; }
  if (pendingPolygon) { map.removeLayer(pendingPolygon); pendingPolygon = null; }
  drawMarkers.forEach(m => map.removeLayer(m)); drawMarkers = [];
  drawPoints = [];
  editingId = null;
  document.getElementById('panel-title-text').textContent = 'Nouvelle parcelle';
  document.getElementById('bottom-panel').classList.remove('open');
}

function saveParcelle() {
  const nom = document.getElementById('panel-nom').value.trim();
  const surface = parseFloat(m2ToHa(pendingArea));
  const latlngs = drawPoints.map(pt => [pt.lat, pt.lng]);
  if (pendingPolygon) { map.removeLayer(pendingPolygon); pendingPolygon = null; }
  if (editingId) {
    // Mise à jour tracé parcelle existante
    const p = parcelles.find(p=>p.id===editingId);
    if (p) {
      p.latlngs = latlngs;
      p.surface = surface.toFixed(4);
      if (nom) p.nom = nom;
      save();
      removePolygonFromMap(editingId);
      addPolygonToMap(p);
    }
    editingId = null;
  } else {
    // Nouvelle parcelle
    const id = Date.now();
    const p = {id, nom: nom || 'Parcelle', surface: surface.toFixed(4), coupes: 0, latlngs, rendements:{}};
    parcelles.push(p);
    save();
    addPolygonToMap(p);
  }
  document.getElementById('panel-title-text').textContent = 'Nouvelle parcelle';
  drawPoints = [];
  document.getElementById('bottom-panel').classList.remove('open');
  renderList();
}

function polyColors(p) {
  const cult = p.culture || p.culture2 || null;
  if (cult) { const cc = cultureColor(cult); return {color: cc.color, fill: cc.fill}; }
  return {color:'#1D9E75', fill:'#1D9E75'};
}

function addPolygonToMap(p) {
  if (!p.latlngs || !p.latlngs.length) return;
  const {color, fill} = polyColors(p);
  const poly = L.polygon(p.latlngs, {
    color, fillColor:fill, fillOpacity:0.3, weight:2
  }).addTo(map);
  poly.bindPopup(() => {
    const surf = parseFloat(p.surface) || 0;
    const ci = p.culture ? cultureInfo(p.culture) : null;
    const ci2 = p.culture2 ? cultureInfo(p.culture2) : null;
    const cultStr = ci ? `<div class="popup-culture" style="color:${polyColors(p).color};margin-bottom:3px">${ci.label}${ci2?' + '+ci2.label+' (dérobée)':''}</div>` : '';
    return `<div class="popup-name">${p.nom || 'Parcelle'}</div>
      ${cultStr}
      <div class="popup-surf">${surf.toFixed(2)} ha &middot; ${p.coupes} coupe${p.coupes>1?'s':''}</div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button onclick="showTab('list');setTimeout(()=>highlightCard(${p.id}),200);map.closePopup()"
          style="flex:1;padding:5px 8px;font-size:12px;border:0.5px solid #ccc;border-radius:6px;background:#fff;cursor:pointer">

        <button onclick="map.closePopup();startRedraw(${p.id})"
          style="flex:1;padding:5px 8px;font-size:12px;border:none;border-radius:6px;background:#1D9E75;color:#fff;cursor:pointer;font-weight:600">
          <i class="ti ti-pencil"></i> Redessiner
        </button>
      </div>`;
  }, {maxWidth: 220});
  poly.on('click', function() { /* popup gère les actions */ });
  polygonLayers[p.id] = poly;
}

function updatePolygonColor(id) {
  const p = parcelles.find(p=>p.id===id);

// Migration ancien format → tableau
function migrateRendements(p) {
  if (!p.rendements) { p.rendements = {}; return; }
  for (const c in p.rendements) {
    const r = p.rendements[c];
    if (r && !Array.isArray(r)) {
      p.rendements[c] = [{type: r.type||'', valeur: r.valeur||'', unite: r.unite||'bottes'}];
    }
  }
}

function getProds(p, coupe) {
  migrateRendements(p);
  if (!p.rendements[coupe]) p.rendements[coupe] = [{type:'', valeur:'', unite:'bottes'}];
  return p.rendements[coupe];
}

function setCoupeCulture(id, coupe, val) {
  const p = parcelles.find(p=>p.id===id);
  if (!p) return;
  if (!p.coupesCulture) p.coupesCulture = {};
  p.coupesCulture[coupe] = val;
  save();
  // Rafraîchir le label dans la carte
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) { const rb = card.querySelector('.rendements'); if (rb) rb.innerHTML = buildRendementsHTML(p); }
}

function setRendement(id, coupe, prodIdx, field, val) {
  const p = parcelles.find(p => p.id === id);
  if (!p) return;
  migrateRendements(p);
  const prods = getProds(p, coupe);
  if (!prods[prodIdx]) prods[prodIdx] = {type:'', valeur:'', unite:'bottes'};
  prods[prodIdx][field] = val;
  if (field === 'type' && val) {
    const ti = typeInfo(val);
    prods[prodIdx].unite = ti.unite;
  }
  save();
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) { const rb = card.querySelector('.rendements'); if (rb) rb.innerHTML = buildRendementsHTML(p); }
  renderSummary();
}

function addProduit(id, coupe) {
  const p = parcelles.find(p => p.id === id);
  if (!p) return;
  migrateRendements(p);
  getProds(p, coupe).push({type:'', valeur:'', unite:'bottes'});
  save();
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) { const rb = card.querySelector('.rendements'); if (rb) rb.innerHTML = buildRendementsHTML(p); }
}

function delProduit(id, coupe, prodIdx) {
  const p = parcelles.find(p => p.id === id);
  if (!p) return;
  migrateRendements(p);
  const prods = getProds(p, coupe);
  if (prods.length > 1) prods.splice(prodIdx, 1);
  save();
  const card = document.querySelector(`.card[data-id="${id}"]`);
  if (card) { const rb = card.querySelector('.rendements'); if (rb) rb.innerHTML = buildRendementsHTML(p); }
  renderSummary();
}

function renderCardCoupes(id) {
  const p = parcelles.find(p => p.id === id); if (!p) return;
  const card = document.querySelector(`.card[data-id="${id}"]`); if (!card) return;
  card.querySelectorAll('.cb').forEach((btn,i) => btn.classList.toggle('active', p.coupes >= i+1));
  renderCardStats(id);
  // Mettre à jour le bloc rendements
  const rdmtBlock = card.querySelector('.rendements');
  if (rdmtBlock) rdmtBlock.innerHTML = buildRendementsHTML(p);
}

function buildRendementsHTML(p) {
  if (!p.coupes) return '';
  migrateRendements(p);
  if (!p.coupesCulture) p.coupesCulture = {};
  const hasDero = !!p.culture2;
  // Options culture pour chaque coupe
  const cultChoices = [
    {val:'principale', label: (p.culture ? cultureInfo(p.culture)?.label : null) || 'Principale'},
    ...(hasDero ? [{val:'derobee', label: (cultureInfo(p.culture2)?.label || 'Dérobée') + ' (dérobée)'}] : [])
  ];
  let html = '<div class="lbl" style="margin-bottom:5px">Rendements</div>';
  for (let i = 1; i <= p.coupes; i++) {
    const prods = getProds(p, i);
    const coupeCtx = p.coupesCulture[i] || 'principale';
    // Badge couleur selon culture de la coupe
    const ctxInfo = coupeCtx === 'derobee' && p.culture2 ? cultureInfo(p.culture2) : (p.culture ? cultureInfo(p.culture) : null);
    const fc = ctxInfo ? familleColor(ctxInfo.famille) : null;
    const badge = fc ? `background:${fc.fill}33;color:${fc.color};border:1px solid ${fc.color}44` : 'background:var(--bg-sec)';
    const cultSelect = hasDero ? `<select onchange="setCoupeCulture(${p.id},${i},this.value)"
      style="font-size:10px;padding:2px 5px;border:0.5px solid var(--border-med);border-radius:8px;${badge};outline:none;cursor:pointer;max-width:110px">
      ${cultChoices.map(c=>`<option value="${c.val}"${coupeCtx===c.val?' selected':''}>${c.label}</option>`).join('')}
    </select>` : (ctxInfo ? `<span style="font-size:10px;font-weight:600;padding:2px 7px;border-radius:8px;${badge}">${ctxInfo.label}</span>` : '');
    html += `<div style="margin-bottom:6px;padding-bottom:6px;border-bottom:0.5px solid var(--border)">`;
    html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:4px">
      <span class="rdmt-label" style="white-space:nowrap">Coupe ${i}</span>
      ${cultSelect}
      <button onclick="addProduit(${p.id},${i})" style="font-size:10px;padding:2px 7px;border:0.5px solid var(--border-med);border-radius:10px;background:transparent;color:var(--green);cursor:pointer;font-weight:600;white-space:nowrap">+ produit</button>
    </div>`;
    prods.forEach((r, pi) => {
      const v = parseFloat(r.valeur) || 0;
      const tot = v > 0 ? (r.unite === 'tonnes' ? v.toFixed(2)+' t' : Math.round(v)+' bottes') : '';
      const typeOpts = TYPES_RECOLTE.map(t =>
        `<option value="${t.val}"${r.type===t.val?' selected':''}>${t.label}</option>`
      ).join('');
      const uniteOpts = ['bottes','tonnes'].map(u =>
        `<option value="${u}"${r.unite===u?' selected':''}>${u}</option>`
      ).join('');
      html += `<div class="rdmt-row" style="margin-bottom:3px">
        <div class="rdmt-inputs">
          <select onchange="setRendement(${p.id},${i},${pi},'type',this.value)" style="max-width:72px">
            <option value="">— type —</option>${typeOpts}
          </select>
          <input type="number" min="0" step="0.1" placeholder="0" value="${r.valeur}"
            oninput="setRendement(${p.id},${i},${pi},'valeur',this.value)" style="width:48px">
          <select onchange="setRendement(${p.id},${i},${pi},'unite',this.value)" style="max-width:60px">${uniteOpts}</select>
          ${tot ? `<span class="rdmt-total">= ${tot}</span>` : ''}
          ${prods.length > 1 ? `<button onclick="delProduit(${p.id},${i},${pi})" style="border:none;background:transparent;color:var(--text-hint);cursor:pointer;font-size:13px;padding:0 2px">✕</button>` : ''}
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}

function renderCardStats(id) {
  const p = parcelles.find(p => p.id === id); if (!p) return;
  const card = document.querySelector(`.card[data-id="${id}"]`); if (!card) return;
  const surf = parseFloat(p.surface) || 0;
  const stats = card.querySelectorAll('.cs');
  if (stats[0]) stats[0].querySelector('.v').textContent = p.coupes;
  if (stats[1]) stats[1].querySelector('.v').textContent = surf.toFixed(2);
  if (stats[2]) stats[2].querySelector('.v').textContent = (surf*p.coupes).toFixed(2);
}

function renderSummary() { /* résumé maintenant dans onglet Bilan */ }

function renderRecap() {
  const el = document.getElementById('recap-content');
  if (!el) return;
  const valid = parcelles.filter(p => parseFloat(p.surface) > 0);
  if (!valid.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-sec)"><i class="ti ti-chart-bar" style="font-size:36px;display:block;margin-bottom:8px"></i><p>Aucune parcelle avec surface renseignée</p></div>';
    return;
  }
  const totalSurf = valid.reduce((s,p)=>s+parseFloat(p.surface),0);
  const totalCumul = valid.reduce((s,p)=>s+parseFloat(p.surface)*p.coupes,0);
  const totalNbCoupes = valid.reduce((s,p)=>s+p.coupes,0);
  const nbFauches = valid.filter(p=>p.coupes>0).length;

  // Helper production d'une liste de parcelles
  function calcProd(ps2, filterCtx) {
    // filterCtx: undefined=tout, 'principale', 'derobee'
    const prod = {};
    ps2.forEach(p2 => {
      if (!p2.rendements) return;
      migrateRendements(p2);
      if (!p2.coupesCulture) p2.coupesCulture = {};
      Object.entries(p2.rendements).forEach(([cn, prods]) => {
        if (!Array.isArray(prods)) return;
        const ctx = p2.coupesCulture[cn] || 'principale';
        if (filterCtx && ctx !== filterCtx) return;
        prods.forEach(r => {
          const v = parseFloat(r.valeur)||0; if (!v) return;
          const tp = r.type||'_nr';
          if (!prod[tp]) prod[tp]={t:0,bottes:0};
          if (r.unite==='tonnes') prod[tp].t+=v; else prod[tp].bottes+=v;
        });
      });
    });
    return prod;
  }
  function prodBadges(prod) {
    let s='';
    TYPES_RECOLTE.forEach(ti=>{
      const d=prod[ti.val]; if(!d) return;
      const v=[];
      if(d.t>0) v.push(d.t.toFixed(1)+' t');
      if(d.bottes>0) v.push(Math.round(d.bottes)+' bottes');
      s+=`<span class="rdmt-type-badge ${ti.css}" style="margin:1px">${ti.label} : ${v.join(' + ')}</span> `;
    });
    return s||'—';
  }

  // ── Chiffres clés ──
  let html = `<div class="recap-section">
    <div class="recap-section-title"><i class="ti ti-info-circle"></i> Chiffres clés</div>
    <div class="sum-grid">
      <div class="sc"><div class="v">${valid.length}</div><div class="l">Parcelles</div></div>
      <div class="sc"><div class="v">${totalSurf.toFixed(2)} ha</div><div class="l">Surface totale</div></div>
      <div class="sc" style="grid-column:1/-1"><div class="v">${totalCumul.toFixed(2)} ha</div><div class="l">Surface coupée cumulée</div></div>
    </div>
  </div>`;

  // ── Par culture ──
  const byCulture = {};
  valid.forEach(p => {
    const cults = [p.culture, p.culture2].filter(Boolean);
    if (!cults.length) cults.push('_nc');
    cults.forEach((cv, ci2) => {
      if (!byCulture[cv]) byCulture[cv] = {parcelles:[], derobee: ci2>0};
      byCulture[cv].parcelles.push(p);
    });
  });
  html += `<div class="recap-section">
    <div class="recap-section-title"><i class="ti ti-leaf"></i> Par culture</div>
    <table class="recap-table">
      <tr><th>Culture</th><th>Surface</th><th>Production</th></tr>`;
  let totSurfCult=0, totCoupesCult=0;
  Object.entries(byCulture).forEach(([cv, d]) => {
    const ci3 = cultureInfo(cv);
    const fc = ci3 ? familleColor(ci3.famille) : null;
    const label = ci3 ? ci3.label : 'Non renseigné';
    const dot = fc ? `<span class="cult-dot" style="background:${fc.color}"></span>` : '';
    const derobStr = d.derobee ? ' <span class="derobee-label">(dérobée)</span>' : '';
    const surf = d.parcelles.reduce((s,p)=>s+parseFloat(p.surface||0),0);
    const coupes = d.parcelles.reduce((s,p)=>s+p.coupes,0);
    totSurfCult+=surf; totCoupesCult+=coupes;
    const ctx = d.derobee ? 'derobee' : 'principale';
    html+=`<tr><td>${dot}${label}${derobStr}</td><td>${surf.toFixed(2)} ha</td><td>${prodBadges(calcProd(d.parcelles, ctx))}</td></tr>`;
  });
  html+=`<tr class="total-row"><td>TOTAL</td><td>${totalSurf.toFixed(2)} ha</td><td>${prodBadges(calcProd(valid, undefined))}</td></tr>`;
  html+=`</table></div>`;

  // ── Par type de récolte ──
  html+=`<div class="recap-section">
    <div class="recap-section-title"><i class="ti ti-stack"></i> Par type de récolte</div>
    <table class="recap-table">
      <tr><th>Type</th><th>Production</th></tr>`;
  const byRecolte = {};
  valid.forEach(p => {
    if (!p.rendements) return;
    migrateRendements(p);
    Object.entries(p.rendements).forEach(([cn,prods]) => {
      if (!Array.isArray(prods)) return;
      prods.forEach(r => {
        const v=parseFloat(r.valeur)||0; if(!v) return;
        const tp=r.type||'_nr';
        if(!byRecolte[tp]) byRecolte[tp]={nb:0,t:0,bottes:0};
        byRecolte[tp].nb++;
        if(r.unite==='tonnes') byRecolte[tp].t+=v; else byRecolte[tp].bottes+=v;
      });
    });
  });
  TYPES_RECOLTE.forEach(ti=>{
    const d=byRecolte[ti.val]; if(!d) return;
    const vals=[];
    if(d.t>0) vals.push(d.t.toFixed(1)+' t');
    if(d.bottes>0) vals.push(Math.round(d.bottes)+' bottes');
    html+=`<tr><td><span class="rdmt-type-badge ${ti.css}">${ti.label}</span></td><td>${vals.join(' + ')||'—'}</td></tr>`;
  });
  if(byRecolte['_nr']) { html+=`<tr><td><span style="color:var(--text-hint);font-size:11px">Non renseigné</span></td><td>—</td></tr>`; }
  html+=`</table></div>`;

  // ── Détail par coupe ──
  html+=`<div class="recap-section">
    <div class="recap-section-title"><i class="ti ti-scissors"></i> Détail par coupe</div>
    <table class="recap-table">
      <tr><th>Coupe</th><th>Parcelles</th><th>Surface</th><th>Production</th></tr>`;
  for(let i=1;i<=MAX_C;i++){
    const ps=valid.filter(p=>p.coupes>=i); if(!ps.length) continue;
    const surf=ps.reduce((s,p)=>s+parseFloat(p.surface||0),0);
    const cpProd={};
    ps.forEach(p2=>{
      if(!p2.rendements) return;
      migrateRendements(p2);
      const prods2=p2.rendements[i]; if(!Array.isArray(prods2)) return;
      prods2.forEach(r2=>{
        const v2=parseFloat(r2.valeur)||0; if(!v2) return;
        const tp=r2.type||'_nr';
        if(!cpProd[tp]) cpProd[tp]={t:0,bottes:0};
        if(r2.unite==='tonnes') cpProd[tp].t+=v2; else cpProd[tp].bottes+=v2;
      });
    });
    let cpStr='';
    TYPES_RECOLTE.forEach(ti=>{
      const d=cpProd[ti.val]; if(!d) return;
      const v=[]; if(d.t>0) v.push(d.t.toFixed(1)+' t'); if(d.bottes>0) v.push(Math.round(d.bottes)+' bottes');
      cpStr+=`<span class="rdmt-type-badge ${ti.css}" style="margin:1px">${ti.label} ${v.join('+')}</span>`;
    });
    html+=`<tr><td>Coupe ${i}</td><td>${ps.length}</td><td>${surf.toFixed(2)} ha</td><td>${cpStr||'—'}</td></tr>`;
  }
  html+=`</table></div>`;

  el.innerHTML = html;
}

function filterParcelles() {
  const q=(document.getElementById('search').value||'').toLowerCase().trim();
  document.querySelectorAll('.card').forEach(c=>{
    const nom=c.dataset.nom||'';
    c.classList.toggle('hidden', q.length>0 && !nom.includes(q));
  });
  const nr=document.getElementById('no-result');
  const visible=document.querySelectorAll('.card:not(.hidden)');
  if(nr) nr.style.display=visible.length===0?'block':'none';
}

function renderList() {
  const grid=document.getElementById('grid');
  if(!parcelles.length){
    grid.innerHTML=`<div class="empty"><i class="ti ti-plant"></i><p>Aucune parcelle.<br>Dessinez sur la carte ou ajoutez manuellement.</p></div>`;
    return;
  }
  grid.innerHTML=parcelles.map(p=>{
    const surf=parseFloat(p.surface)||0;
    const hasMap=p.latlngs && p.latlngs.length>0;
    let btns='';
    for(let i=1;i<=MAX_C;i++){
      btns+=`<button class="cb${p.coupes>=i?' active':''}" onclick="toggleCoupe(${p.id},${i})">${i}</button>`;
    }
    const safenom=(p.nom||'').replace(/"/g,'&quot;');
    const surfField = hasMap
      ? `<div class="surf-badge"><i class="ti ti-map-2"></i>${surf.toFixed(2)} ha (carte)</div>`
      : `<div class="surf-row"><div class="lbl" style="flex:1;margin:0">Surface</div>
          <input type="number" placeholder="0.00" min="0" step="0.01" value="${p.surface}" oninput="setSurface(${p.id},this.value)">
          <span class="unit">ha</span></div>`;
    const cultOpts = '<option value="">— Culture —</option>' + CULTURES.map(c =>
      `<option value="${c.val}"${p.culture===c.val?' selected':''}>${c.label}</option>`).join('');
    const cultOpts2 = '<option value="">— Dérobée —</option>' + CULTURES.map(c =>
      `<option value="${c.val}"${p.culture2===c.val?' selected':''}>${c.label}</option>`).join('');
    const ci = p.culture ? cultureInfo(p.culture) : null;
    const fc = ci ? familleColor(ci.famille) : null;
    const cultBadge = ci ? `<span class="cult-badge" style="background:${fc.fill}22;color:${fc.color};border:1px solid ${fc.color}44;margin-bottom:4px;display:inline-flex"><span class="cult-dot" style="background:${fc.color}"></span>${ci.label}</span>` : '';
    return `<div class="card" data-id="${p.id}" data-nom="${(p.nom||'').toLowerCase()}">
      <button class="del-btn" onclick="delParcelle(${p.id})"><i class="ti ti-trash"></i></button>
      <div class="lbl">Parcelle</div>
      <input type="text" placeholder="Nom…" value="${safenom}" oninput="setNom(${p.id},this.value)">
      ${surfField}
      ${cultBadge}
      <div class="culture-select-wrap">
        <select onchange="setCulture(${p.id},'culture',this.value)">${cultOpts}</select>
      </div>
      <div class="derobee-wrap" id="derobee-wrap-${p.id}" style="display:${p.culture?'block':'none'}">
        <select onchange="setCulture(${p.id},'culture2',this.value)" style="width:100%;font-size:11px;padding:3px 6px;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);background:var(--bg-sec);color:var(--text-sec);outline:none;">${cultOpts2}</select>
      </div>
      <div class="lbl" style="margin-top:7px">Coupes effectuées</div>
      <div class="coupes-row">${btns}</div>
      <div class="card-stats">
        <div class="cs"><div class="v">${p.coupes}</div><div class="l">coupes</div></div>
        <div class="cs"><div class="v">${surf.toFixed(2)}</div><div class="l">ha parc.</div></div>
        <div class="cs"><div class="v">${(surf*p.coupes).toFixed(2)}</div><div class="l">ha coupé</div></div>
      </div>
      <div class="rendements">${buildRendementsHTML(p)}</div>
      ${hasMap?`<div style="display:flex;gap:5px;margin-top:8px">
        <button onclick="flyTo(${p.id})" style="flex:1;padding:5px;font-size:11px;border:0.5px solid var(--border-med);border-radius:var(--radius-sm);background:transparent;color:var(--text-sec);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px"><i class="ti ti-map-pin"></i> Voir</button>
        <button onclick="startRedraw(${p.id})" class="redraw-btn" style="flex:1;margin-top:0"><i class="ti ti-pencil"></i> Redessiner</button>
      </div>`:''}
    </div>`;
  }).join('')+'<div id="no-result" style="display:none" class="no-result">Aucune parcelle trouvée</div>';
  renderSummary();
  filterParcelles();
}

function flyTo(id) {
  const p = parcelles.find(p=>p.id===id);
  if (!p || !p.latlngs || !p.latlngs.length) return;
  showTab('map');
  setTimeout(() => {
    const poly = polygonLayers[id];
    if (poly) { map.fitBounds(poly.getBounds(), {padding:[60,60]}); poly.openPopup(); }
  }, 150);
}

// INIT — load existing polygons
function init() {
  parcelles.forEach(p => addPolygonToMap(p));
  renderList();
}
init();
</script>
